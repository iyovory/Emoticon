<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIF Showcase</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8f8f8;
      font-family: sans-serif;
    }

    .gallery {
      display: flex;
      gap: 60px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 300px;
      height: 300px;
      object-fit: contain;
      border-radius: 16px;
      background: white;
      padding: 10px;
    }

    .item p {
      margin-top: 10px;
      font-weight: bold;
      font-size: 25px;
    }
  </style>
</head>

<body>
  <div class="gallery">
    <div class="item">
      <img src="HAPPY_fin.gif" />
      <p>행복</p>
    </div>

    <div class="item">
      <img src="ANGRY_fin.gif" />
      <p>화남</p>
    </div>

    <div class="item">
      <img src="SURPRIZE_fin.gif" />
      <p>놀람</p>
    </div>
  </div>
</body>
</html>
